<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mini_Tienda</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
  <header class="navbar navbar-light bg-light px-4">
    <h1 class="navbar-brand mb-0">Mini tienda de Julian</h1>
    <div class="d-flex align-items-center gap-2">
      <span>Carrito de compras</span>
      <i class="bi bi-cart fs-4"></i>
      <span id="badge" class="badge bg-secondary">0</span>
    </div>
  </header>

  <!-- seccion productos -->
  <main class="container my-4">
    <div class="row g-3">
      <div class="col-12 col-sm-6 col-lg-3">
        <div class="card h-100">
          <div class="card-body d-flex flex-column">
            <img src="./assets/ip17.jpg" alt="iphone 17 pro max">
            <h5 class="card-title">Iphone 17 Pro max</h5>
            <p class="card-text fs-5 fw-bold">$4.500.000</p>
            <button class="btn btn-primary mt-auto btn-agregar" data-nombre="Iphone 17 Pro max" data-precio="4500000">
              Agregar al carrito
            </button>
          </div>
        </div>
      </div>

      <div class="col-12 col-sm-6 col-lg-3">
        <div class="card h-100">
          <div class="card-body d-flex flex-column">
            <img src="./assets/s25.jfif" alt="Samsung Galaxy S25">
            <h5 class="card-title">Samsung Galaxy S25</h5>
            <p class="card-text fs-5 fw-bold">$4.000.000</p>
            <button class="btn btn-primary mt-auto btn-agregar" data-nombre="Samsung Galaxy S25" data-precio="4000000">
              Agregar al carrito
            </button>
          </div>
        </div>
      </div>


      <div class="col-12 col-sm-6 col-lg-3">
        <div class="card h-100">
          <div class="card-body d-flex flex-column">
            <img src="./assets/x15.jfif" alt="">
            <h5 class="card-title">Xiaomi 15</h5>
            <p class="card-text fs-5 fw-bold">$3.500.000</p>
            <button class="btn btn-primary mt-auto btn-agregar" data-nombre="Xiaomi 15" data-precio="3500000">
              Agregar al carrito
            </button>
          </div>
        </div>
      </div>


      <div class="col-12 col-sm-6 col-lg-3">
        <div class="card h-100">
          <div class="card-body d-flex flex-column">
            <img src="./assets/on12.jfif" alt="One Plus 12">
            <h5 class="card-title">One Plus 12</h5>
            <p class="card-text fs-5 fw-bold">$3.000.000</p>
            <button class="btn btn-primary mt-auto btn-agregar" data-nombre="One Plus 12" data-precio="3000000">
              Agregar al carrito
            </button>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- carrito de compras -->
  <section class="container my-4">
    <h2>Carrito de compras</h2>

    <ul id="lista-carrito" class="list-group mb-3">
      <!-- Los productos se agregan aquí con JS -->
    </ul>

    <div class="d-flex justify-content-between align-items-center">
      <p class="fs-5 mb-0">
        Total: <span id="total" class="fw-bold">$0</span>
      </p>
      <button id="btn-vaciar" class="btn btn-danger">
        Vaciar carrito
      </button>
    </div>
  </section>



  <footer>
    <div class="bg-light text-center width-100 p-2 y-2">
      <p>Todos los derechos reservados a Mini Tienda de Julian</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script src="./script.js"></script>
</body>

</html>
